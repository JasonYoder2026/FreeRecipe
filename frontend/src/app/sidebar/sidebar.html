<aside class="sidebar">
  <div class="sidebar-brand">
    <img src="/assets/icon.png" alt="Free Recipe" class="sidebar-logo" />
    <span class="sidebar-wordmark">Free Recipe</span>
  </div>

  <nav class="sidebar-nav">
    <div class="sidebar-nav-top">
      <button *ngFor="let item of topNavItems" [class.active]="activeTab === item.id" class="sidebar-nav-item"
        (click)="onNavClick(item.id)">
        <span class="sidebar-nav-icon">
          <!-- Home Icon -->
          <svg *ngIf="item.icon === 'home'" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 10l7-7 7 7v8a1 1 0 01-1 1h-3v-5H7v5H4a1 1 0 01-1-1v-8z" stroke="currentColor" stroke-width="1.5"
              fill="none" stroke-linecap="round" stroke-linejoin="round" />
          </svg>

          <!-- Compass Icon -->
          <svg *ngIf="item.icon === 'compass'" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5" fill="none" />
            <path d="M13 7l-4 2-2 4 4-2 2-4z" fill="currentColor" opacity="0.4" />
          </svg>

          <!-- Message Icon -->
          <svg *ngIf="item.icon === 'message'" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path
              d="M17 9.5C17 13.64 13.64 17 9.5 17c-.83 0-1.63-.14-2.37-.4L3 18l1.4-4.13A7.42 7.42 0 012 9.5C2 5.36 5.36 2 9.5 2S17 5.36 17 9.5z"
              stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
          </svg>

          <!-- Plus Icon -->
          <svg *ngIf="item.icon === 'plus'" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5" fill="none" />
            <path d="M10 6v8M6 10h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </span>
        <span class="sidebar-nav-label">{{ item.label }}</span>
      </button>
    </div>

    <div class="sidebar-nav-bottom">
      <button *ngFor="let item of bottomNavItems" [class.active]="activeTab === item.id" class="sidebar-nav-item"
        (click)="onNavClick(item.id)">
        <span class="sidebar-nav-icon">
          <!-- Chat Icon -->
          <svg *ngIf="item.icon === 'chat'" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path
              d="M18 5.5v9c0 .83-.67 1.5-1.5 1.5h-13C2.67 16 2 15.33 2 14.5v-9C2 4.67 2.67 4 3.5 4h13c.83 0 1.5.67 1.5 1.5z"
              stroke="currentColor" stroke-width="1.5" fill="none" />
            <path d="M2 5.5L10 11l8-5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>

          <!-- Settings Icon -->
          <svg *ngIf="item.icon === 'settings'" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5" fill="none" />
            <path
              d="M10 2v2m0 12v2M4.93 4.93l1.41 1.41m7.32 7.32l1.41 1.41M2 10h2m12 0h2M4.93 15.07l1.41-1.41m7.32-7.32l1.41-1.41"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </span>
        <span class="sidebar-nav-label">{{ item.label }}</span>
      </button>
    </div>
  </nav>
</aside>
