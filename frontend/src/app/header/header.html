<header class="app-header">
  <div class="header-left">
    <img src="/icon.png" alt="Free Recipe" class="header-logo" />
    <span class="header-wordmark">Free Recipe</span>
  </div>

  <div class="header-center">
    <form (ngSubmit)="onSearch()" class="search-form" >
      <div class="search-wrapper">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5" fill="none" />
          <path d="M12 12l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        <input type="text" placeholder="Search recipes, ingredients, users..." [ngModelOptions]="{ standalone: true }" [(ngModel)]="searchQuery"
          class="search-input" />
        <button *ngIf="searchQuery" type="button" (click)="clearSearch()" class="search-clear"
          aria-label="Clear search">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </form>
  </div>

  <div class="header-right">
    <button class="notification-btn" aria-label="Notifications" (click)="onNotificationClick()">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M15 7a5 5 0 10-10 0c0 3.5-1.5 4.5-1.5 4.5h13S15 10.5 15 7zM11.73 15.5a2 2 0 01-3.46 0"
          stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span *ngIf="notificationCount > 0" class="notification-badge">{{ notificationCount }}</span>
    </button>

    <div class="profile-menu">
      <button class="profile-btn" (click)="onProfileClick()">
        <img *ngIf="userAvatar" [src]="userAvatar" [alt]="userName" class="profile-avatar" />
        <div *ngIf="!userAvatar" class="profile-avatar-placeholder">
          {{ userInitial }}
        </div>
        <span class="profile-name">{{ userName }}</span>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" class="profile-chevron">
          <path d="M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>
    </div>
  </div>
</header>
